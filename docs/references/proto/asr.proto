syntax = "proto3";
package asr;

// 后端 Python → 前端：音频帧
// 后端每次推送一段 PCM/WAV 音频，携带说话人和会话信息。
message AudioFrame {
  bytes  data            = 1;  // PCM/WAV 原始字节
  string speaker_id      = 2;  // 说话人 UUID
  string speaker_name    = 3;  // 说话人显示名
  string speaker_role    = 4;  // "customer" | "agent"  
  string language        = 6;  // 语言代码，默认 "zh"
  bool   is_last         = 7;  // true 表示本轮最后一包（当前语句结束）
  uint32 sequence_number = 8;  // 单调递增序号，从 1 开始；0 表示不启用序号检测
}

// 服务端 → 客户端：识别事件（AsrWsService 使用，与 HTTP/SSE 字段对齐）
message TranscriptEvent {
  string type            = 1;  // "partial" | "final"
  string text            = 2;  // 原始识别文本
  string corrected       = 3;  // 纠错后文本（优先展示）
  string speaker_id      = 4;
  string speaker_name    = 5;
  string speaker_role    = 6;  // "customer" | "agent"
  string call_session_id = 7;
  string turn_id         = 8;  // 轮次 ID（final 时返回）
  int64  duration_ms     = 9;  // 音频时长（ms，final 时返回）
  string ts              = 10; // 时间戳，RFC3339 格式
}
