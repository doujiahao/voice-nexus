syntax = "proto3";
package asr;

option java_package = "org.jeecg.modules.call.proto";
option java_outer_classname = "AsrProto";
option java_multiple_files = false;

// freeswichService → Java：音频帧
message AudioFrame {
  bytes  data            = 1;
  string speaker_id      = 2;
  string speaker_name    = 3;
  string speaker_role    = 4;  // "customer" | "agent"
  string call_session_id = 5;
  string language        = 6;
  bool   is_last         = 7;
  uint32 sequence_number = 8;
}

// Java → 前端：识别事件
message TranscriptEvent {
  string type            = 1;  // "partial" | "final"
  string text            = 2;
  string corrected       = 3;
  string speaker_id      = 4;
  string speaker_name    = 5;
  string speaker_role    = 6;  // "customer" | "agent"
  string call_session_id = 7;
  string turn_id         = 8;
  int64  duration_ms     = 9;
  string ts              = 10;
}
